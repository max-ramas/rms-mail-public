# =============================================================================
# RMS Mail — Mono Edition (Single-Account, SQLite, no PostgreSQL / Redis)
# =============================================================================
#   Usage:
#   cp .env-m.example .env
#   nano .env  — fill in REQUIRED values
#   docker compose up -d
# =============================================================================

services:
  backend:
    image: maxramas/rms-mail:latest-m
    # For local development builds, replace the line above with:
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    #   args:
    #     EDITION: mono
    container_name: rms-mail-mono
    restart: unless-stopped
    networks:
      - rms-mail
    ports:
      - "${PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Optional mail server overrides (see .env-m.example):
    #   RMS_MAIL_HOST=mail.example.com    # M-version: override auto-detected mail server
    #   RMS_IMAP_HOST=imap.example.com    # Override IMAP host
    #   RMS_SMTP_HOST=smtp.example.com    # Override SMTP host
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      CAMO_HMAC_KEY: ${CAMO_HMAC_KEY:-}
      DATA_ROOT: /app/data
      STORAGE_ROOT: /app/storage
      # Opt-in: mount custom nginx config (when using external nginx/openresty)
      # - ./nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://localhost:${PORT:-8080}/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: maxramas/rms-mail-ui:latest-m
    container_name: rms-mail-ui
    restart: unless-stopped
    networks:
      - rms-mail
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - API_URL=http://backend:8080
      - INTERNAL_URL=http://backend:8080
    depends_on:
      - backend

networks:
  rms-mail:
    name: rms-mail
    driver: bridge
