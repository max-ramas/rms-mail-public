# =============================================================================
# RMS Mail — Mono Pro Edition (PostgreSQL + Redis, 1:1 user-mailbox)
# =============================================================================
# Usage:
#   cp .env-mp.example .env
#   nano .env  — fill in REQUIRED values
#   docker compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:18-alpine
    container_name: rms-mail-pg-mp
    restart: unless-stopped
    networks:
      - rms-mail
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rmsmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-geomail_mp}
    command: >
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c max_connections=50
    volumes:
      - ./pgdata_mp:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-rmsmail} -d $${POSTGRES_DB:-geomail_mp}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: rms-mail-redis-mp
    restart: unless-stopped
    networks:
      - rms-mail
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - ./redisdata_mp:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    image: maxramas/rms-mail:mp-latest
    container_name: rms-mail-api-mp
    restart: unless-stopped
    networks:
      - rms-mail
    ports:
      - "${PORT:-8080}:8080"
    user: "0:0"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      CAMO_HMAC_KEY: ${CAMO_HMAC_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      PUBLIC_URL: ${PUBLIC_URL:-}
      MCP_API_URL: ${MCP_API_URL:-}
      APP_ENV: ${APP_ENV:-production}
      STORAGE_ROOT: /app/storage
      PORT: "8080"
      EDITION: "mono_pro"
      PG_MAX_CONNS: ${PG_MAX_CONNS:-20}
      PG_SYNC_MAX_CONNS: ${PG_SYNC_MAX_CONNS:-}
      PG_STATEMENT_TIMEOUT: ${PG_STATEMENT_TIMEOUT:-}
      SYNC_BATCH_DELAY_MS: ${SYNC_BATCH_DELAY_MS:-2000}
      SYNC_MAX_WORKERS: ${SYNC_MAX_WORKERS:-}
      IMAP_PER_HOST_CONN: ${IMAP_PER_HOST_CONN:-}
      ASYNC_CONCURRENCY: ${ASYNC_CONCURRENCY:-}
      TRUSTED_MX_DOMAINS: ${TRUSTED_MX_DOMAINS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      TG_ENVONLY: ${TG_ENVONLY:-}
      LLM_ENVONLY: ${LLM_ENVONLY:-}
      AI_DISABLE: ${AI_DISABLE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage_mp:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://localhost:${PORT:-8080}/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: maxramas/rms-mail:mp-ui-latest
    container_name: rms-mail-ui-mp
    restart: unless-stopped
    networks:
      - rms-mail
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - API_URL=http://backend:8080
      - INTERNAL_URL=http://backend:8080
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    depends_on:
      - backend

networks:
  rms-mail:
    name: rms-mail-mp
    driver: bridge

volumes:
  redisdata:
